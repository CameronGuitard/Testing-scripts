name: Cherry Pick After Merge

on:
  pull_request:
    types: [closed]
    branches:
      - staging   # only run when PRs are merged into staging

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    # Run only if PR was merged and has the 'create_preprod-pr' label
    if: >
      github.event.pull_request.merged == true &&
      contains(toJson(github.event.pull_request.labels), 'create_preprod-pr')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Fetch all branches
        run: git fetch origin

      - name: Get PR number
        run: echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> $GITHUB_ENV

      - name: Create new branch
        run: |
          BASE=preprod   # target branch for the new PR
          NEW_BRANCH=cherry-pick-pr-${PR_NUMBER}-to-$BASE
          git checkout origin/$BASE
          git checkout -b $NEW_BRANCH
          echo "NEW_BRANCH=$NEW_BRANCH" >> $GITHUB_ENV

      - name: Cherry-pick commits (ignore merge commits)
        run: |
          SKIPPED_COMMITS=""
          PICKED_COMMITS=0
          COMMITS=$(gh pr view $PR_NUMBER --json commits --jq '.commits[].commit.oid')

          for c in $COMMITS; do
            PARENTS=$(git rev-list --parents -n 1 $c | wc -w)
            COMMIT_INFO="$(git log -1 --pretty=format:'%h %s' $c)"

            if [ $PARENTS -gt 2 ]; then
              echo "Skipping merge commit $c"
              SKIPPED_COMMITS="$SKIPPED_COMMITS\n- $COMMIT_INFO (merge commit)"
              continue
            fi

            if ! git cherry-pick $c; then
              echo "Conflict on $c, skipping commit"
              git cherry-pick --abort
              SKIPPED_COMMITS="$SKIPPED_COMMITS\n- $COMMIT_INFO (conflict)"
              continue
            fi

            PICKED_COMMITS=$((PICKED_COMMITS+1))
          done

          echo -e "SKIPPED_COMMITS=$SKIPPED_COMMITS" >> $GITHUB_ENV
          echo "PICKED_COMMITS=$PICKED_COMMITS" >> $GITHUB_ENV

      - name: Stop if no commits were cherry-picked
        if: env.PICKED_COMMITS == '0'
        run: |
          echo "❌ No commits were cherry-picked. Skipping PR creation."
          exit 0

      - name: Push branch
        run: git push origin $NEW_BRANCH

      - name: Open new PR
        id: open_pr
        run: |
          BODY="This PR was automatically created by cherry-picking commits from #$PR_NUMBER (ignoring merge commits).

          "
          if [ -n "${SKIPPED_COMMITS}" ]; then
            BODY="$BODY\n⚠️ The following commits were skipped:\n${SKIPPED_COMMITS}"
          fi

          URL=$(gh pr create \
            --title "Cherry-pick of #$PR_NUMBER to preprod" \
            --body "$BODY" \
            --base preprod \
            --head $NEW_BRANCH \
            --json url \
            --jq '.url')

          echo "PR_URL=$URL" >> $GITHUB_ENV

      - name: Add auto-cherry-pick label
        run: gh pr edit "$PR_URL" --add-label "auto-cherry-pick"
